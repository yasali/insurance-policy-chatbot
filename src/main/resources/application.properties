server.port=8080
spring.application.name=policies

# Database Configuration
spring.datasource.url=jdbc:h2:file:./db-file
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Liquibase Configuration
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.contexts=dev

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson Configuration (JSON serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# LLM Configuration
llm.provider=ollama
llm.model=llama3.2
llm.base-url=http://localhost:11434
llm.timeout=60s

# To switch to a different LLM provider:
# OpenAI: llm.provider=openai, llm.model=gpt-3.5-turbo, llm.base-url=https://api.openai.com/v1, llm.api-key=your-key
# Gemini: llm.provider=gemini, llm.model=gemini-pro, llm.api-key=your-key
